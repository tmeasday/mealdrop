name: "Chromatic Web"

on: push

jobs:
  chromatic-app:
    name: Run Chromatic for web app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: 22.x
      - name: Install dependencies
        run: yarn install
      - name: Run Chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN_APP }}
          buildCommand: yarn turbo build-storybook --filter=@mealdrop/web
          outputDir: ./apps/web/build/storybook
  chromatic-ui:
    name: Run Chromatic for UI library
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: 22.x
      - name: Install dependencies
        run: yarn install
      - name: Run Chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN_UI }}
          buildCommand: yarn turbo build-storybook --filter=@mealdrop/ui
          outputDir: ./packages/ui/build/storybook
